<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>Filter Numbers</title>

<style>
@keyframes float {
  0% { transform: translateY(0px); }
  50% { transform: translateY(-12px); }
  100% { transform: translateY(0px); }
}

.animate-float{
  animation: float 6s ease-in-out infinite;
}

@keyframes spinSlow {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}

.animate-spinSlow{
  animation: spinSlow 12s linear infinite;
}

@keyframes bounceSlow {
  0%,100% { transform: translateY(0); }
  50% { transform: translateY(-10px); }
}

.animate-bounceSlow{
  animation: bounceSlow 4s infinite;
}
</style>

</head>
<body>
 <div class="min-h-screen flex items-center justify-center bg-[#0b0120] p-6">

  <!-- Main Card -->
  <div class="relative w-full max-w-lg p-8 rounded-3xl 
  bg-linear-to-br from-purple-900/40 to-indigo-900/40 
  backdrop-blur-xl border border-purple-500/30 
  shadow-[0_20px_60px_rgba(139,92,246,0.5)]
  animate-float">

    <!-- Title -->
    <h1 class="text-3xl font-bold text-purple-300 mb-6 tracking-wider">
      Filter Even Numbers
    </h1>

    <!-- Input -->
    <div class="relative mb-6">

      <input
        id="filterInput"
        type="text"
        placeholder="Enter something..."
        class="w-full px-5 py-3 rounded-xl
        bg-purple-950/60 text-purple-100
        border border-purple-500/40
        outline-none
        focus:ring-2 focus:ring-purple-500
        shadow-inner"
      />

      <!-- Icon -->
      <span class="absolute right-4 top-3 text-purple-400 text-xl">
        ✏️
      </span>

    </div>

    <!-- Button -->
    <button
      id="filterBtn"
      class="flex items-center gap-2 px-6 py-3
      rounded-xl
      bg-linear-to-r from-purple-600 to-indigo-600
      text-white font-semibold
      shadow-[0_10px_30px_rgba(139,92,246,0.7)]
      hover:scale-105
      hover:shadow-[0_15px_40px_rgba(139,92,246,1)]
      transition">

      ⚡ Filter
    </button>

    <!-- Output Box -->
    <div 
    id="output"
    class="mt-8 p-6 rounded-xl
    bg-purple-950/60
    border border-purple-500/40
    text-purple-200
    shadow-inner
    animate-pulse">

      Output will appear here...

    </div>

    <!-- Floating Icons -->
    <div class="absolute -top-6 -right-6 text-3xl animate-spinSlow">
      ⚙️
    </div>

    <div class="absolute -bottom-6 -left-6 text-3xl animate-bounceSlow">
      ✨
    </div>

  </div>

</div>


<script src="./script.js"></script>

</body>
</html>
